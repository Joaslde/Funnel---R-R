<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Challenge R&R™</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ============================================================
   RESET & VARIABLES GLOBALES
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:       #C9A84C;
  --gold-dark:  #988038;
  --red:        #7B1E1E;
  --red-hover:  #9B2424;
  --cream:      #F5F0E8;
  --white:      #FFFFFF;
  --black-soft: #1a1a1a;
  --text-muted: #888888;
}

body {
  font-family: 'Poppins', sans-serif;
  background-color: var(--cream);
  color: var(--black-soft);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 20px;
}

/* ============================================================
   EN-TÊTE DU QUIZ (ACCUEIL)
   ============================================================ */
.rr-header {
  text-align: center;
  margin-bottom: 40px;
  max-width: 800px;
  transition: opacity 0.3s ease, max-height 0.4s ease, margin 0.4s ease;
  overflow: hidden;
}
.rr-header.hidden {
  opacity: 0;
  max-height: 0 !important;
  margin-bottom: 0 !important;
  pointer-events: none;
}
.rr-header-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(32px, 5vw, 48px);
  font-weight: 600;
  color: var(--black-soft);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 12px;
  line-height: 1.2;
}
.rr-header-title span {
  color: var(--gold);
}
.rr-header-sub {
  font-size: 18px;
  color: #555;
}

/* ============================================================
   CONTENEUR PRINCIPAL DU QUIZ
   ============================================================ */
.rr-quiz-container {
  width: 100%;
  max-width: 800px;
  background: var(--white);
  border-radius: 12px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.08);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 500px;
}

/* BARRE DE PROGRESSION */
.rr-quiz-pbar {
  height: 6px;
  background: rgba(0,0,0,0.05);
  flex-shrink: 0;
  width: 100%;
}
.rr-quiz-pfill {
  height: 100%;
  width: 0%; /* Géré dynamiquement en JS */
  background: linear-gradient(90deg, var(--gold-dark), var(--gold));
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ÉCRAN DE QUESTION */
.rr-quiz-screen {
  display: flex;
  flex-direction: column;
  flex: 1;
  padding: 40px 50px;
  animation: fadeIn 0.4s ease forwards;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* HIERARCHIE DES TITRES DES QUESTIONS (MODIFIÉE) */
.rr-q-num-container {
  margin-bottom: 24px;
}
.rr-q-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  display: inline-block;
  margin-bottom: 6px;
}
.rr-q-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 30px; /* Plus grand que la question elle-même */
  font-weight: 700;
  color: var(--gold-dark);
  line-height: 1.2;
}
.rr-q-text {
  font-size: 22px;
  font-weight: 600;
  color: var(--black-soft);
  line-height: 1.4;
  margin-bottom: 32px;
  padding-left: 16px;
  border-left: 3px solid rgba(201,168,76,0.3);
}

/* OPTIONS DE RÉPONSE */
.rr-q-opts {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.rr-q-opt {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 18px 20px;
  border: 1.5px solid rgba(0,0,0,0.08);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
  background: var(--white);
}
.rr-q-opt:hover {
  border-color: var(--gold);
  background: rgba(201,168,76,0.04);
  transform: translateX(4px);
}
.rr-q-opt.sel {
  border-color: var(--gold);
  background: rgba(201,168,76,0.08);
}
.rr-q-letter {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1.5px solid var(--gold);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 800;
  color: var(--gold);
  flex-shrink: 0;
  transition: all 0.2s;
}
.rr-q-opt.sel .rr-q-letter {
  background: var(--gold);
  color: var(--white);
}
.rr-q-opttext {
  font-size: 17px;
  font-weight: 500;
  color: #333;
  line-height: 1.45;
  padding-top: 4px;
}

/* NAVIGATION */
.rr-quiz-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid rgba(0,0,0,0.05);
}
.rr-qbtn {
  padding: 14px 26px;
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'Poppins', sans-serif;
}
.rr-qbtn-prev {
  background: rgba(0,0,0,0.05);
  color: #666;
}
.rr-qbtn-prev:hover {
  background: rgba(0,0,0,0.1);
}
.rr-quiz-hint {
  font-size: 16px;
  color: #000;
  font-style: italic;
  font-weight: 700;
}

/* ============================================================
   RÉSULTAT DU QUIZ
   ============================================================ */
.rr-quiz-result {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  padding: 50px 40px;
  text-align: center;
  animation: fadeIn 0.6s ease forwards;
}

/* PROFIL DOMINANT (MODIFIÉ) */
.rr-res-eye {
  margin-bottom: 32px;
  text-align: center;
}
.rr-res-eye-label {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  display: inline-block;
  margin-bottom: 8px;
}
.rr-res-archetype-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 48px; /* Beaucoup plus gros et visible */
  font-weight: 700;
  color: var(--black-soft); /* Changé en noir pour un contraste fort */
  line-height: 1.1;
  display: block;
}

/* AVATAR ARCHÉTYPE */
.rr-res-avatar-wrap {
  position: relative;
  margin-bottom: 24px;
}
.rr-res-avatar {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid var(--gold);
  box-shadow: 0 0 0 8px rgba(201,168,76,0.12), 0 15px 35px rgba(0,0,0,0.15);
  display: block;
  margin: 0 auto;
}
.rr-res-avatar-ring {
  position: absolute;
  inset: -12px;
  border-radius: 50%;
  border: 1.5px dashed rgba(201,168,76,0.4);
  animation: spinRing 20s linear infinite;
  pointer-events: none;
}

/* TITRE CATÉGORIE (MODIFIÉ) */
.rr-res-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 600;
  color: var(--gold-dark);
  margin-bottom: 40px;
  line-height: 1.2;
}
.cat-label {
  font-family: 'Poppins', sans-serif;
  font-size: 18px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ============================================================
   NOUVELLE STRUCTURE DU CONTENU DES RÉSULTATS (DICHOTOMIE)
   ============================================================ */
.rr-res-content {
  width: 100%;
  text-align: left;
  display: flex;
  flex-direction: column;
  gap: 24px; /* Espace entre les blocs */
  margin-bottom: 40px;
}

/* Typographie globale des sections */
.rr-res-section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; /* Plus grand pour respecter la hiérarchie */
  font-weight: 700;
  margin-bottom: 16px;
  line-height: 1.3;
}
.rr-res-section-intro {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.7;
  margin-bottom: 12px;
}
.rr-res-section-text {
  font-size: 15px;
  line-height: 1.8;
}

/* BLOC 1 : DIAGNOSTIC (Style Sombre et Immersif) */
.rr-res-card-diag {
  background: var(--black-soft);
  color: #ececec;
  border-radius: 12px;
  padding: 36px 32px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.1);
}
.rr-res-card-diag .rr-res-section-title {
  color: var(--gold);
  border-bottom: 1px solid rgba(201,168,76,0.2);
  padding-bottom: 12px;
}
.rr-res-card-diag .rr-res-section-intro { color: var(--white); }

/* BLOC 2 & 4 : VÉHICULE & OPPORTUNITÉ (Style Clair et Structuré) */
.rr-res-card-light {
  background: var(--white);
  border: 1px solid rgba(0,0,0,0.06);
  border-top: 5px solid var(--text-muted);
  border-radius: 10px;
  padding: 36px 32px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.03);
}
.rr-res-card-light.opp { border-top-color: var(--gold); } /* Variante pour l'opportunité */
.rr-res-card-light .rr-res-section-title { color: var(--black-soft); }
.rr-res-card-light .rr-res-section-intro { color: #444; }
.rr-res-card-light .rr-res-section-text { color: #555; }

/* BLOC 3 : EFFET DOMINO (Style Accent avec liseré) */
.rr-res-card-accent {
  background: rgba(201,168,76,0.06);
  border-left: 5px solid var(--gold);
  border-radius: 8px;
  padding: 32px;
}
.rr-res-card-accent .rr-res-section-title { color: var(--gold-dark); }
.rr-res-quote {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  font-style: italic;
  color: var(--black-soft);
  text-align: center;
  padding: 24px;
  margin: 20px 0;
  background: var(--white);
  border-radius: 8px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.04);
}

/* BLOC 5 : CALL TO ACTION (Zone de transition forte) */
.rr-res-card-cta-zone {
  background: linear-gradient(145deg, #ffffff 0%, #f9f6f0 100%);
  border: 2px dashed rgba(201,168,76,0.3);
  border-radius: 12px;
  padding: 40px 32px;
  text-align: center;
}
.rr-res-card-cta-zone .rr-res-cta-section-title {
  font-family: 'Poppins', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--red);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
}
.rr-res-card-cta-zone .rr-res-section-text {
  text-align: center;
  color: #444;
  margin-bottom: 30px;
}

/* Listes dans les cartes claires */
.rr-res-buls {
  list-style: none;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-top: 16px;
}
.rr-res-buls li {
  font-size: 15px;
  color: #444;
  padding-left: 28px;
  position: relative;
  line-height: 1.6;
}
.rr-res-buls li strong {
  color: var(--black-soft);
  font-weight: 700;
}
.rr-res-buls li::before {
  content: '\f0da'; /* Flèche FontAwesome */
  font-family: 'Font Awesome 6 Free';
  font-weight: 900;
  position: absolute;
  left: 0;
  top: 2px;
  color: var(--gold);
  font-size: 16px;
}

/* BOUTON D'ACTION FINAL */
.rr-res-cta {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: var(--red);
  color: var(--white);
  padding: 20px 40px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 10px 30px rgba(123,30,30,0.25);
  font-family: 'Poppins', sans-serif;
  width: 100%;
  max-width: 500px;
}
.rr-res-cta:hover {
  background: var(--red-hover);
  transform: translateY(-3px);
  box-shadow: 0 15px 35px rgba(123,30,30,0.35);
}

/* BOUTON RECOMMENCER */
.rr-quiz-restart {
  margin-top: 24px;
  background: none;
  border: none;
  color: #999;
  font-size: 14px;
  cursor: pointer;
  text-decoration: underline;
  font-family: 'Poppins', sans-serif;
  transition: color 0.2s;
}
.rr-quiz-restart:hover { color: var(--black-soft); }

.rr-res-hybrid {
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 400;
  display: block;
  margin-top: 8px;
  font-family: 'Poppins', sans-serif;
  letter-spacing: 0;
  text-transform: none;
}

/* RESPONSIVE */
@media(max-width:768px) {
  .rr-quiz-screen, .rr-quiz-result { padding: 30px 20px; }
  .rr-q-title { font-size: 24px; }
  .rr-q-text { font-size: 18px; }
  .rr-q-opttext { font-size: 15px; }
  .rr-res-archetype-name { font-size: 36px; }
  .rr-res-title { font-size: 26px; }
  .rr-res-card-diag, .rr-res-card-light, .rr-res-card-accent, .rr-res-card-cta-zone { padding: 24px 20px; }
  .rr-res-quote { font-size: 18px; padding: 16px; }
  .rr-quiz-nav { flex-direction: column-reverse; gap: 16px; text-align: center; }
  .rr-qbtn-prev { width: 100%; justify-content: center; }
}
</style>
</head>
<body>

  <header class="rr-header" id="rrHeader">
    <h1 class="rr-header-title">Bienvenue sur le quiz du challenge <span>R&R™</span></h1>
    <p class="rr-header-sub">Effectue ce diagnostic en toute honnêteté pour connaître ton profil exact et tes prochains leviers d'action.</p>
  </header>

  <div class="rr-quiz-container" id="quizContainer">
  </div>

<script>
/**
 * ============================================================
 * DONNÉES DU QUIZ
 * ============================================================
 */
const QUIZ_QUESTIONS = [
  { title: "Évalue comment tu es reconnu par tes clients", q: "Quand tu aides quelqu'un, tu as le sentiment que :", opts: ["On te remercie, mais sans te considérer comme une référence","On te consulte pour \"avoir ton avis\", rarement pour décider","On reconnaît ton expertise, mais pas à sa juste valeur financière","Ton impact est clair, mais mal compris ou mal formulé","Ton travail est respecté et reconnu (rare)"] },
  { title: "Découvre ton rapport à la vente", q: "Quelle phrase te ressemble le plus ?", opts: ["Je déteste me mettre en avant.","Je sais vendre… mais pas aux bonnes personnes.","Je veux gagner de l'argent sans mentir sur qui je suis.","Je n'ai pas encore trouvé une structure de vente claire.","Je ne sais pas comment expliquer simplement ma valeur."] },
  { title: "La typologie de tes clients actuels", q: "Aujourd'hui, tes clients/prospects sont surtout :", opts: ["Reconnaissants mais peu engageants","Négociateurs, flous ou ne te correspondent pas","Inconstants : parfois bons, parfois inexistants","Trop variés, sans logique claire","Perdus face à ton message"] },
  { title: "Évalue ta stabilité financière", q: "Tes revenus sont aujourd'hui :", opts: ["Irréguliers et imprévisibles","Acceptables mais instables","Corrects mais épuisants à maintenir","En décalage avec ton impact réel","Sereins et alignés"] },
  { title: "Évalue la lisibilité de ton rôle", q: "Si un inconnu te demandait ce que tu fais, tu pourrais :", opts: ["L'expliquer… mais en plusieurs minutes","Donner une réponse qui change selon la personne","Dire ce que tu fais, mais pas vraiment pourquoi c'est important","En parler mais c'est inconfortable quand il s'agit de parler d'argent","Donner une réponse claire, simple et mémorable"] },
  { title: "Découvre ta balance : Effort vs résultats", q: "Quand tu regardes ton investissement personnel :", opts: ["Tu donnes beaucoup pour peu de reconnaissance","Tu travailles dur pour des résultats incohérents","Tu fournis beaucoup d'efforts émotionnels","Tu avances sans vision globale","Tu ajustes sans cesse ton discours"] },
  { title: "Évalue la charge mentale liée à ton business", q: "Dans ton activité, tu ressens surtout :", opts: ["Une fatigue mentale constante","Beaucoup de doutes stratégiques","Le poids de décider tout seul","L'impression de faire beaucoup sans levier clair","Une clarté globale"] },
  { title: "Décris ton vrai problème (Utilise ton intuition)", q: "La phrase qui te ressemble le plus :", opts: ["Je suis utile, mais invisible.","Je fais bien les choses, mais ce n'est pas reconnu.","Ce n'est pas normal que ce soit aussi compliqué.","Je sais que ça pourrait marcher mieux… mais je ne vois pas comment.","Je suis globalement aligné."] },
  { title: "Décris ton \"drapeau rouge\" : Non négociable !", q: "Tu refuses catégoriquement :", opts: ["De devenir bruyant pour exister","D'attirer n'importe quel client","De vendre du vide","De suivre des tactiques sans vision","De devenir un personnage de télé-réalité pour être compris"] },
  { title: "Décris ton plus grand désir aujourd'hui", q: "Ce que tu veux profondément maintenant :", opts: ["Être reconnu pour ta vraie valeur","Attirer naturellement les bons clients sans te travestir","Gagner de l'argent en restant aligné","Avoir une trajectoire claire","Exister de manière lisible et forte"] }
];

// Matrice 3D : QUIZ_W[question][réponse] = [pts Avatar1, pts Avatar2, pts Avatar3]
// A=index0, B=index1, C=index2, D=index3, E=index4
const QUIZ_W = [
  // Q1 — Évalue comment tu es reconnu
  [[2,0,0],[3,0,0],[0,3,0],[1,0,2],[0,0,0]],
  // Q2 — Rapport à la vente
  [[3,0,0],[0,1,2],[0,3,0],[0,0,3],[3,0,0]],

  [[2,1,0],[1,2,0],[0,3,0],[0,0,3],[3,0,0]],

  [[3,0,0],[0,2,1],[0,3,0],[0,0,3],[2,0,0]],
  // Q7 — Charge mentale
  [[0,1,2],[0,0,3],[0,0,3],[2,2,0],[0,0,0]],

  // Q10 — Plus grand désir
  [[3,0,0],[0,3,0],[0,3,0],[0,0,3],[2,0,1]]

  A: {
    img: "expert.jpg",

    category: "L'Expert Invisible",

    s1_detail: "Aujourd'hui, tu es une bibliothèque de classe mondiale avec une devanture de garage. Tu aides réellement tes clients, ton impact est concret, mais aux yeux du marché, tu ressembles encore à un \"caillou gris\". Parce que ta structure n'est pas taillée, les prospects te confondent avec du gravier (la commodité) et cherchent à négocier ton prix au kilo.",
    s2_title: "2. L'Ancien Véhicule : L'Accumulation \"Silencieuse\"",

    s2_bullets: [

      "<strong>Le Coût de l'Inaction :</strong> Tu augmentes ton ratio Effort et Sacrifice sans toucher à la situation désirée par ton client. Plus tu accumules de savoir sans structure, plus tu deviens \"l'expert complexe\" qu'on écoute poliment mais qu'on ne choisit jamais pour réaliser le projet.",
      "<strong>Ton sacrifice actuel :</strong> Tu paies la \"Taxe d'Invisibilité\". Tu vois des profils moins compétents que toi prendre la place qui te revient, simplement parce que leur emballage est plus lisible."
    ],
    s3_title: "3. L'Effet Domino",

    s4_bullets: [

      "<strong>La Libération (Effort réduit) :</strong> Tu arrêtes de \"pousser\" pour être remarqué. Ta stature attire naturellement les clients qui respectent ta valeur."

/**
 * ============================================================
 * LOGIQUE ET ÉTAT DU QUIZ
 * ============================================================
 */
let qAnswers = {}; 
let qStep = 0;     
let quizStarted = false; 
const totalQuestions = QUIZ_QUESTIONS.length;

document.addEventListener('DOMContentLoaded', initQuiz);

function initQuiz() {
  qAnswers = {};
  qStep = 0;
  quizStarted = false;
  document.getElementById('rrHeader').classList.remove('hidden');
  renderQuiz();
}

function renderQuiz() {
  const container = document.getElementById('quizContainer');
  const pct = Math.min(100, (qStep / totalQuestions) * 100);
  const letters = ['A','B','C','D','E'];

  // 1. Barre de progression
  let html = `
    <div class="rr-quiz-pbar">
      <div class="rr-quiz-pfill" style="width: ${pct}%"></div>
    </div>
  `;

  // 2. Affichage des Questions
  if (qStep < totalQuestions) {
    const q = QUIZ_QUESTIONS[qStep];
    const sel = qAnswers[qStep]; 

    html += `
      <div class="rr-quiz-screen">
        <div class="rr-q-num-container">
          <span class="rr-q-label">QUESTION ${qStep + 1}</span><br/>
          <span class="rr-q-title">${q.title}</span>
        </div>
        <p class="rr-q-text">${q.q}</p>
        <div class="rr-q-opts">
    `;

    q.opts.forEach((opt, i) => {
      const isSelected = (sel === i) ? ' sel' : '';
      html += `
        <div class="rr-q-opt${isSelected}" onclick="selectAns(${i})">
          <span class="rr-q-letter">${letters[i]}</span>
          <span class="rr-q-opttext">${opt}</span>
        </div>
      `;
    });

    html += `</div>`; 

    html += `<div class="rr-quiz-nav">`;
    if (qStep > 0) {
      html += `
        <button class="rr-qbtn rr-qbtn-prev" onclick="goPrev()">
          <i class="fa-solid fa-chevron-left"></i> Précédent
        </button>
      `;
    } else {
      html += `<div></div>`; 
    }
    
    html += `
          <span class="rr-quiz-hint">Clique sur une réponse pour continuer</span>
        </div>
      </div>
    `;

  // 3. Affichage du Résultat (MODIFIÉ AVEC DICHOTOMIE)
  } else {
    // 1. Initialisation des 3 jauges
    const scores = { A: 0, B: 0, C: 0 };
    let totalPoints = 0;

    // 2. Calcul : chaque réponse (A-E) distribue ses points aux 3 avatars simultanément
    for (let qi = 0; qi < totalQuestions; qi++) {
      const ans = qAnswers[qi];
      if (ans !== undefined && ans >= 0 && ans <= 4) {
        const pts = QUIZ_W[qi][ans]; // [pts_A, pts_B, pts_C]
        scores.A += pts[0];
        scores.B += pts[1];
        scores.C += pts[2];
        totalPoints += pts[0] + pts[1] + pts[2];
      }
    }

    // 3. Tri décroissant des scores
    const sortedScores = Object.entries(scores).sort((a, b) => b[1] - a[1]);

    // 4. Profil dominant avec tie-breaking selon PDF :
    //    A = B → A gagne | A ou B = C → C gagne
    let dom;
    if (totalPoints === 0) {
      dom = 'A'; // fallback si tout D/E
    } else {
      const first = sortedScores[0];
      const second = sortedScores[1];
      if (first[1] > second[1]) {
        dom = first[0]; // vainqueur clair
      } else {
        // Égalité stricte
        const tied = [first[0], second[0]];
        dom = tied.includes('C') ? 'C' : 'A'; // C prime sur A/B ; A prime sur B
      }
    }

    // 5. Profil hybride : écart ≤ 2 et au moins 1 point (anti-faux positif D/E)
    const scoreDiff = sortedScores[0][1] - sortedScores[1][1];
    const hybrid = scoreDiff <= 2 && totalPoints > 0;

    const r = QUIZ_RES[dom];

    // Note l'intégration de "Catégorie : " et la séparation en blocs (cards)
    html += `
      <div class="rr-quiz-result">
        <p class="rr-res-eye">
          <span class="rr-res-eye-label">Ton profil dominant :</span>
          <span class="rr-res-archetype-name">${r.archetype}</span>
        </p>

        <div class="rr-res-avatar-wrap">
          <img class="rr-res-avatar" src="${r.img}" alt="${r.category}" onerror="this.style.display='none'">
          <div class="rr-res-avatar-ring"></div>
        </div>

        <h2 class="rr-res-title">
          <span class="cat-label">Catégorie : </span>${r.category}
          ${hybrid ? '<span class="rr-res-hybrid">· Profil hybride</span>' : ''}
        </h2>

        <div class="rr-res-content">
          <div class="rr-res-card-diag">
            <h3 class="rr-res-section-title">${r.s1_title}</h3>
            <p class="rr-res-section-intro">${r.s1_text}</p>
            <p class="rr-res-section-text">${r.s1_detail}</p>
          </div>

          <div class="rr-res-card-light">
            <h3 class="rr-res-section-title">${r.s2_title}</h3>
            <p class="rr-res-section-intro">${r.s2_intro}</p>
            <ul class="rr-res-buls">
              ${r.s2_bullets.map(b => `<li>${b}</li>`).join('')}
            </ul>
          </div>

          <div class="rr-res-card-accent">
            <h3 class="rr-res-section-title">${r.s3_title}</h3>
            <p class="rr-res-section-intro">${r.s3_intro}</p>
            <blockquote class="rr-res-quote">${r.s3_quote}</blockquote>
            <p class="rr-res-section-text">${r.s3_text}</p>
          </div>

          <div class="rr-res-card-light opp">
            <h3 class="rr-res-section-title">${r.s4_title}</h3>
            <p class="rr-res-section-intro">${r.s4_intro}</p>
            <ul class="rr-res-buls">
              ${r.s4_bullets.map(b => `<li>${b}</li>`).join('')}
            </ul>
          </div>

          <div class="rr-res-card-cta-zone">
            <h3 class="rr-res-cta-section-title">${r.cta_section_title}</h3>
            <p class="rr-res-section-text">${r.cta_text}</p>
            <button class="rr-res-cta"><i class="fa-solid fa-fire"></i> ${r.cta}</button>
          </div>
        </div>

        <button class="rr-quiz-restart" onclick="initQuiz()">Recommencer le diagnostic</button>
      </div>
    `;
  }

  container.innerHTML = html;
}

function selectAns(i) {
  qAnswers[qStep] = i;

  if (!quizStarted) {
    quizStarted = true;
    document.getElementById('rrHeader').classList.add('hidden');
  }
  
  renderQuiz(); 
  
  setTimeout(() => {
    qStep++;
    renderQuiz();
  }, 300);
}

function goPrev() {
  if (qStep > 0) {
    qStep--;
    renderQuiz();
  }
}
</script>
